<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sambhu Khata</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1d2671,#c33764);
    margin:0;
}

.container {
    width:370px;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:15px;
}

input, select, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
}

button {
    background:#1d2671;
    color:white;
    border:none;
}

li {
    background:#f9f9f9;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.credit { color:red; font-weight:bold; }
.debit { color:green; font-weight:bold; }
</style>
</head>

<body>

<div class="container">

<h2>📒 Sambhu Khata</h2>

<input id="searchCustomer" placeholder="Search" onkeyup="renderCustomers()">

<input id="customerName" placeholder="Add Customer">
<button onclick="addCustomer()">Add Customer</button>

<select id="customerDropdown" onchange="selectCustomer()">
<option value="">Select Customer</option>
</select>

<div id="selectedInfo"></div>

<div id="transactionSection" style="display:none;">

<h3 id="customerTitle"></h3>

<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<input id="reminderDate" type="date">
<input id="note" type="text" placeholder="📝 Add note">

<button onclick="addTransaction('credit')">Credit</button>
<button onclick="addTransaction('debit')">Debit</button>

<h4>
Credit: ₹ <span id="creditTotal">0</span> |
Debit: ₹ <span id="debitTotal">0</span><br>
Balance: ₹ <span id="balance">0</span>
</h4>

<ul id="transactions"></ul>

<button onclick="goBack()">Back</button>

</div>

</div>

<script>
// 🔥 YOUR DATA RESTORED
let customers = {
"subhankar":[],
"abu babu":[],
"papu pici ghar":[],
"arghya":[],
"Arghya wife":[],
"dr. satyajit":[],
"suva biker jone":[],
"Prasenjit Barhat":[],
"Braja Babu":[
{"amount":600,"type":"credit","date":"","reminder":""},
{"amount":4000,"type":"credit","date":"","reminder":""}
],
"Amiya":[],
"Paritosh":[],
"bisu Pnb":[],
"Chayanika Studio":[],
"HM PINTU":[]
};

// save once
localStorage.setItem("customers", JSON.stringify(customers));

// ADD CUSTOMER
function addCustomer(){
    let name=customerName.value;
    if(!name) return alert("Enter name");

    if(!customers[name]) customers[name]=[];
    save();
    renderCustomers();
    customerName.value="";
}

// DROPDOWN
function renderCustomers(){
    let dropdown=customerDropdown;
    let search=searchCustomer.value.toLowerCase();

    dropdown.innerHTML=`<option value="">Select Customer</option>`;

    for(let name in customers){
        if(!name.toLowerCase().includes(search)) continue;

        let credit=0,debit=0;

        customers[name].forEach(i=>{
            if(i.type==="credit") credit+=i.amount;
            else debit+=i.amount;
        });

        let balance=credit-debit;

        let option=document.createElement("option");
        option.value=name;
        option.text=`${name} (₹${balance})`;

        dropdown.appendChild(option);
    }
}

// SELECT
function selectCustomer(){
    let name=customerDropdown.value;
    if(!name) return;

    let credit=0,debit=0;

    customers[name].forEach(i=>{
        if(i.type==="credit") credit+=i.amount;
        else debit+=i.amount;
    });

    let balance=credit-debit;
    let info=document.getElementById("selectedInfo");

    if(balance>0){
        info.innerHTML=`🔴 ${name} owes you ₹${balance}`;
        info.style.color="red";
    }
    else if(balance<0){
        info.innerHTML=`🟢 You owe ${name} ₹${Math.abs(balance)}`;
        info.style.color="green";
    }
    else{
        info.innerHTML="All clear";
    }

    openCustomer(name);
}

// OPEN
function openCustomer(name){
    customerTitle.innerText=name;
    document.getElementById("transactionSection").style.display="block";
    window.currentCustomer=name;
    renderTransactions();
}

// ADD TRANSACTION
function addTransaction(type){
    let amt=parseInt(amount.value);
    let d=date.value;
    let r=reminderDate.value;
    let noteVal=note.value;

    if(isNaN(amt)) return alert("Enter amount");

    customers[currentCustomer].push({
        amount:amt,
        type,
        date:d,
        reminder:r,
        note:noteVal
    });

    save();
    renderTransactions();

    amount.value="";
    note.value="";
}

// RENDER
function renderTransactions(){
    let list=transactions;
    list.innerHTML="";

    let credit=0,debit=0;

    customers[currentCustomer].forEach((i,index)=>{
        let li=document.createElement("li");

        if(i.type==="credit") credit+=i.amount;
        else debit+=i.amount;

        li.innerHTML=`
        <span class="${i.type}">
        ${i.type==="credit"?"➕":"➖"} ₹${i.amount}
        (${i.date||""})<br>
        🔔 ${i.reminder||"No"}<br>
        📝 ${i.note||"No note"}
        </span>
        <button onclick="deleteTransaction(${index})">❌</button>
        `;

        list.appendChild(li);
    });

    creditTotal.innerText=credit;
    debitTotal.innerText=debit;
    balance.innerText=credit-debit;
}

// DELETE
function deleteTransaction(i){
    customers[currentCustomer].splice(i,1);
    save();
    renderTransactions();
}

function goBack(){
    document.getElementById("transactionSection").style.display="none";
}

// SAVE
function save(){
    localStorage.setItem("customers", JSON.stringify(customers));
}

renderCustomers();
</script>

</body>
</html>
