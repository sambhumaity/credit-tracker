<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sambhu Khata</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    margin:0;
    color:white;
}

.container {
    width:380px;
    margin:20px auto;
    background: rgba(255,255,255,0.05);
    padding:15px;
    border-radius:20px;
    backdrop-filter: blur(12px);
}

/* 🌈 TITLE */
.title {
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-size:28px;
    font-weight:bold;
    background: linear-gradient(270deg,#ff7e5f,#feb47b,#36d1dc,#5b86e5);
    background-size:1000% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: gradientMove 6s infinite;
}

@keyframes gradientMove {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

input, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg,#ff7e5f,#feb47b);
    color:white;
    cursor:pointer;
}

.dashboard {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
    text-align:center;
}

li {
    background: rgba(255,255,255,0.1);
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.credit {color:#ff6b6b;}
.debit {color:#00ffae;}
</style>
</head>

<body>

<div class="container">

<h2 class="title">Sambhu Khata</h2>

<div class="dashboard">
<div class="card">Credit<br><span id="totalCredit">0</span></div>
<div class="card">Debit<br><span id="totalDebit">0</span></div>
<div class="card">Balance<br><span id="totalBalance">0</span></div>
<div class="card">Customers<br><span id="totalCustomers">0</span></div>
</div>

<input id="customerName" placeholder="Add Customer">
<button onclick="addCustomer()">Add Customer</button>

<select id="customerDropdown" onchange="selectCustomer()">
<option>Select Customer</option>
</select>

<div id="transactionSection" style="display:none;">
<h3 id="customerTitle"></h3>

<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<input id="note" placeholder="Note">

<button onclick="addTransaction('credit')">Credit</button>
<button onclick="addTransaction('debit')">Debit</button>

<h4>
Credit: ₹ <span id="creditTotal">0</span> |
Debit: ₹ <span id="debitTotal">0</span><br>
Balance: ₹ <span id="balance">0</span>
</h4>

<ul id="transactions"></ul>

<button onclick="goBack()">Back</button>
</div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKMVIQ1AN32iNxFDnA-5p8vfJMQnetb8w",
  authDomain: "sambhukhata.firebaseapp.com",
  projectId: "sambhukhata",
  storageBucket: "sambhukhata.firebasestorage.app",
  messagingSenderId: "34928539639",
  appId: "1:34928539639:web:a8c8dccea7d25987cc60f2",
  measurementId: "G-55JGRJ60GZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let customers = {};

// 🔥 LOAD DATA FROM FIREBASE
async function loadData(){
    const ref = doc(db, "khata", "data");
    const snap = await getDoc(ref);

    if(snap.exists()){
        customers = snap.data().customers || {};
    }

    renderCustomers();
    updateDashboard();
}
loadData();

// SAVE
async function save(){
    localStorage.setItem("customers", JSON.stringify(customers));

    await setDoc(doc(db,"khata","data"),{
        customers:customers
    });
}

// DASHBOARD
function updateDashboard(){
    let c=0,d=0;
    for(let name in customers){
        customers[name].forEach(i=>{
            if(i.type==="credit") c+=i.amount;
            else d+=i.amount;
        });
    }
    totalCredit.innerText=c;
    totalDebit.innerText=d;
    totalBalance.innerText=c-d;
    totalCustomers.innerText=Object.keys(customers).length;
}

// ADD CUSTOMER
window.addCustomer=function(){
    let name=customerName.value;
    if(!name) return;

    if(!customers[name]) customers[name]=[];
    save();
    renderCustomers();
    updateDashboard();
    customerName.value="";
}

// RENDER
function renderCustomers(){
    customerDropdown.innerHTML="<option>Select Customer</option>";
    for(let name in customers){
        let c=0,d=0;
        customers[name].forEach(i=>{
            if(i.type==="credit") c+=i.amount;
            else d+=i.amount;
        });

        let op=document.createElement("option");
        op.value=name;
        op.text=`${name} (₹${c-d})`;
        customerDropdown.appendChild(op);
    }
}

// SELECT
window.selectCustomer=function(){
    let name=customerDropdown.value;
    if(!name) return;

    currentCustomer=name;
    transactionSection.style.display="block";
    renderTransactions();
}

// ADD TRANSACTION
window.addTransaction=function(type){
    let amt=parseInt(amount.value);
    if(isNaN(amt)) return;

    customers[currentCustomer].push({
        amount:amt,
        type,
        date:date.value,
        note:note.value
    });

    save();
    renderTransactions();
    updateDashboard();

    amount.value="";
    note.value="";
}

// RENDER TRANSACTION
function renderTransactions(){
    let list=transactions;
    list.innerHTML="";
    let c=0,d=0;

    customers[currentCustomer].forEach((i,index)=>{
        if(i.type==="credit") c+=i.amount;
        else d+=i.amount;

        let li=document.createElement("li");
        li.innerHTML=`
        <span class="${i.type}">₹${i.amount}</span>
        <button onclick="deleteTransaction(${index})">❌</button>
        `;
        list.appendChild(li);
    });

    creditTotal.innerText=c;
    debitTotal.innerText=d;
    balance.innerText=c-d;
}

// DELETE
window.deleteTransaction=function(i){
    customers[currentCustomer].splice(i,1);
    save();
    renderTransactions();
    updateDashboard();
}

window.goBack=function(){
    transactionSection.style.display="none";
}

</script>

</body>
</html>
