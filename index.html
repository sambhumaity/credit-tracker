<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Khata Ultimate</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1d2671,#c33764);
    margin:0;
}

/* LOGIN + SIGNUP */
#loginPage, #signupPage {
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* APP */
.container {
    width:370px;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:15px;
}

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
}

button {
    background:#1d2671;
    color:white;
    border:none;
    cursor:pointer;
}

.customer {
    background:#eee;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    cursor:pointer;
}

.hidden { display:none; }

li {
    background:#f9f9f9;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.credit { color:green; font-weight:bold; }
.debit { color:red; font-weight:bold; }

.icon { margin-right:5px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <h2>🔐 Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="showSignup()">📝 Signup</button>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="hidden">
    <h2>📝 Signup</h2>
    <input type="text" id="newUser" placeholder="New Username">
    <input type="password" id="newPass" placeholder="New Password">
    <button onclick="signup()">Create Account</button>
    <button onclick="showLogin()">⬅️ Back</button>
</div>

<!-- APP -->
<div class="container hidden" id="appPage">

<h2>📒 My Khata ULTIMATE</h2>

<button onclick="logout()">🚪 Logout</button>

<input type="password" id="newPassword" placeholder="Change Password">
<button onclick="changePassword()">🔑 Change Password</button>

<input type="text" id="searchCustomer" placeholder="🔍 Search" onkeyup="renderCustomers()">

<input type="text" id="customerName" placeholder="Add Customer">
<button onclick="addCustomer()">➕ Add Customer</button>

<div id="customerList"></div>

<div id="transactionSection" class="hidden">

<h3 id="customerTitle"></h3>

<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<button onclick="addTransaction('credit')">➕ Credit</button>
<button onclick="addTransaction('debit')">➖ Debit</button>

<h4>
Credit: ₹ <span id="creditTotal">0</span> |
Debit: ₹ <span id="debitTotal">0</span><br>
Balance: ₹ <span id="balance">0</span>
</h4>

<ul id="transactions"></ul>

<button onclick="goBack()">⬅️ Back</button>

</div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");
let customers = currentUser && users[currentUser] ? users[currentUser].customers : {};

// LOGIN
function login() {
    let user = username.value;
    let pass = password.value;

    if(users[user] && users[user].password === pass) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("currentUser", user);
        location.reload();
    } else alert("Wrong login!");
}

// SIGNUP
function signup() {
    let user = newUser.value;
    let pass = newPass.value;

    if(users[user]) return alert("User exists!");

    users[user] = {password: pass, customers:{}};
    localStorage.setItem("users", JSON.stringify(users));

    alert("Account created!");
    showLogin();
}

// SHOW PAGE
function showSignup() {
    loginPage.style.display="none";
    signupPage.classList.remove("hidden");
}

function showLogin() {
    signupPage.classList.add("hidden");
    loginPage.style.display="block";
}

function showApp() {
    loginPage.style.display="none";
    signupPage.style.display="none";
    appPage.classList.remove("hidden");
}

// AUTO LOGIN
if(localStorage.getItem("loggedIn")==="true" && currentUser) showApp();

// LOGOUT
function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("currentUser");
    location.reload();
}

// CHANGE PASSWORD
function changePassword() {
    let newPass = newPassword.value;
    users[currentUser].password = newPass;
    localStorage.setItem("users", JSON.stringify(users));
    alert("Password changed!");
}

// CUSTOMER
function addCustomer() {
    let name = customerName.value;
    if(!name) return alert("Enter name");

    if(!customers[name]) customers[name]=[];

    save();
    renderCustomers();
    customerName.value="";
}

function renderCustomers() {
    let list = customerList;
    let search = searchCustomer.value.toLowerCase();
    list.innerHTML="";

    for(let name in customers){
        if(!name.toLowerCase().includes(search)) continue;

        let div=document.createElement("div");
        div.className="customer";
        div.innerText=name;
        div.onclick=()=>openCustomer(name);
        list.appendChild(div);
    }
}

function openCustomer(name) {
    currentCustomer=name;
    customerTitle.innerText=name;

    customerList.style.display="none";
    transactionSection.classList.remove("hidden");

    renderTransactions();
}

// TRANSACTION
function addTransaction(type){
    let amount=parseInt(amount.value);
    let d=date.value;

    if(isNaN(amount)) return alert("Enter amount");

    customers[currentCustomer].push({amount,type,date:d});
    save();
    renderTransactions();

    amount.value="";
}

function renderTransactions(){
    let list=transactions;
    list.innerHTML="";

    let credit=0, debit=0;

    customers[currentCustomer].forEach((item,index)=>{
        let li=document.createElement("li");

        if(item.type==="credit") credit+=item.amount;
        else debit+=item.amount;

        li.innerHTML=`
            <span class="${item.type}">
                <span class="icon">${item.type==="credit"?"➕":"➖"}</span>
                ₹${item.amount} (${item.date||""})
            </span>
            <button onclick="deleteTransaction(${index})">❌</button>
        `;

        list.appendChild(li);
    });

    creditTotal.innerText=credit;
    debitTotal.innerText=debit;
    balance.innerText=credit-debit;
}

function deleteTransaction(index){
    customers[currentCustomer].splice(index,1);
    save();
    renderTransactions();
}

function goBack(){
    customerList.style.display="block";
    transactionSection.classList.add("hidden");
}

// SAVE
function save(){
    users[currentUser].customers = customers;
    localStorage.setItem("users", JSON.stringify(users));
}

renderCustomers();
</script>

</body>
</html>
