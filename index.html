<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sambhu Khata</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    margin:0;
    color:white;
}

/* CONTAINER */
.container {
    width:380px;
    margin:20px auto;
    background: rgba(255,255,255,0.05);
    padding:15px;
    border-radius:20px;
    backdrop-filter: blur(12px);
}

/* 🌈 MOVING GRADIENT TITLE */
.title {
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-size:28px;
    font-weight:bold;

    background: linear-gradient(270deg,#ff7e5f,#feb47b,#36d1dc,#5b86e5,#ff7e5f);
    background-size:1000% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: gradientMove 6s ease infinite;
}

@keyframes gradientMove {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg,#ff7e5f,#feb47b);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 0 10px rgba(255,126,95,0.6);
}

button:hover {
    transform: scale(1.08);
    background: linear-gradient(135deg,#36d1dc,#5b86e5);
    box-shadow:0 0 20px rgba(91,134,229,0.8);
}

/* DASHBOARD */
.dashboard {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
    text-align:center;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% {transform: translateY(0px);}
    50% {transform: translateY(-6px);}
    100% {transform: translateY(0px);}
}

/* LIST */
li {
    background: rgba(255,255,255,0.1);
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.credit {color:#ff6b6b;}
.debit {color:#00ffae;}
</style>
</head>

<body>

<div class="container">

<h2 class="title">Sambhu Khata</h2>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="card">💰 Credit<br><span id="totalCredit">0</span></div>
<div class="card">💸 Debit<br><span id="totalDebit">0</span></div>
<div class="card">📊 Balance<br><span id="totalBalance">0</span></div>
<div class="card">👥 Customers<br><span id="totalCustomers">0</span></div>
</div>

<input id="customerName" placeholder="Add Customer">
<button onclick="addCustomer()">Add Customer</button>

<select id="customerDropdown" onchange="selectCustomer()">
<option>Select Customer</option>
</select>

<div id="transactionSection" style="display:none;">
<h3 id="customerTitle"></h3>

<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<input id="note" placeholder="Note">

<button onclick="addTransaction('credit')">Credit</button>
<button onclick="addTransaction('debit')">Debit</button>

<h4>
Credit: ₹ <span id="creditTotal">0</span> |
Debit: ₹ <span id="debitTotal">0</span><br>
Balance: ₹ <span id="balance">0</span>
</h4>

<ul id="transactions"></ul>

<button onclick="goBack()">Back</button>
</div>

</div>

<script>
let customers = JSON.parse(localStorage.getItem("customers")) || {};

function updateDashboard(){
    let c=0,d=0;
    for(let name in customers){
        customers[name].forEach(i=>{
            if(i.type==="credit") c+=i.amount;
            else d+=i.amount;
        });
    }
    totalCredit.innerText=c;
    totalDebit.innerText=d;
    totalBalance.innerText=c-d;
    totalCustomers.innerText=Object.keys(customers).length;
}

function addCustomer(){
    let name=customerName.value;
    if(!name) return;
    if(!customers[name]) customers[name]=[];
    save();
    renderCustomers();
    updateDashboard();
    customerName.value="";
}

function renderCustomers(){
    customerDropdown.innerHTML="<option>Select Customer</option>";
    for(let name in customers){
        let c=0,d=0;
        customers[name].forEach(i=>{
            if(i.type==="credit") c+=i.amount;
            else d+=i.amount;
        });
        let op=document.createElement("option");
        op.value=name;
        op.text=`${name} (₹${c-d})`;
        customerDropdown.appendChild(op);
    }
}

function selectCustomer(){
    let name=customerDropdown.value;
    if(!name) return;
    currentCustomer=name;
    transactionSection.style.display="block";
    renderTransactions();
}

function addTransaction(type){
    let amt=parseInt(amount.value);
    if(isNaN(amt)) return;

    customers[currentCustomer].push({
        amount:amt,
        type,
        date:date.value,
        note:note.value
    });

    save();
    renderTransactions();
    updateDashboard();

    amount.value="";
    note.value="";
}

function renderTransactions(){
    let list=transactions;
    list.innerHTML="";
    let c=0,d=0;

    customers[currentCustomer].forEach((i,index)=>{
        if(i.type==="credit") c+=i.amount;
        else d+=i.amount;

        let li=document.createElement("li");
        li.innerHTML=`
        <span class="${i.type}">₹${i.amount} - ${i.note||""}</span>
        <button onclick="deleteTransaction(${index})">❌</button>
        `;
        list.appendChild(li);
    });

    creditTotal.innerText=c;
    debitTotal.innerText=d;
    balance.innerText=c-d;
}

function deleteTransaction(i){
    customers[currentCustomer].splice(i,1);
    save();
    renderTransactions();
    updateDashboard();
}

function goBack(){
    transactionSection.style.display="none";
}

function save(){
    localStorage.setItem("customers", JSON.stringify(customers));
}

renderCustomers();
updateDashboard();
</script>

</body>
</html>
