<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Khata Premium</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1d2671,#c33764);
    margin:0;
}

#loginPage, #signupPage {
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.container {
    width:370px;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:15px;
}

input, select, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
}

button {
    background:#1d2671;
    color:white;
    border:none;
}

.hidden { display:none; }

li {
    background:#f9f9f9;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.credit { color:red; font-weight:bold; }   /* তুমি টাকা পাবে */
.debit { color:green; font-weight:bold; } /* তুমি টাকা দেবে */
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>🔐 Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="showSignup()">Signup</button>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="hidden">
<h2>Signup</h2>
<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">
<button onclick="signup()">Create</button>
<button onclick="showLogin()">Back</button>
</div>

<!-- APP -->
<div class="container hidden" id="appPage">

<h2>📒 My Khata Premium</h2>

<button onclick="logout()">Logout</button>

<input id="newPassword" type="password" placeholder="Change Password">
<button onclick="changePassword()">Change Password</button>

<input id="searchCustomer" placeholder="Search" onkeyup="renderCustomers()">

<input id="customerName" placeholder="Add Customer">
<button onclick="addCustomer()">Add Customer</button>

<select id="customerDropdown" onchange="selectCustomer()">
<option value="">Select Customer</option>
</select>

<div id="selectedInfo"></div>

<div id="transactionSection" class="hidden">

<h3 id="customerTitle"></h3>

<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<input id="reminderDate" type="date">

<button onclick="addTransaction('credit')">Credit</button>
<button onclick="addTransaction('debit')">Debit</button>

<h4>
Credit: ₹ <span id="creditTotal">0</span> |
Debit: ₹ <span id="debitTotal">0</span><br>
Balance: ₹ <span id="balance">0</span>
</h4>

<ul id="transactions"></ul>

<button onclick="goBack()">Back</button>

</div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");
let customers = currentUser && users[currentUser] ? users[currentUser].customers : {};

// LOGIN
function login(){
    let u=username.value, p=password.value;
    if(users[u] && users[u].password===p){
        localStorage.setItem("loggedIn","true");
        localStorage.setItem("currentUser",u);
        location.reload();
    } else alert("Wrong login");
}

// SIGNUP
function signup(){
    let u=newUser.value, p=newPass.value;
    if(users[u]) return alert("User exists");

    users[u]={password:p, customers:{}};
    localStorage.setItem("users",JSON.stringify(users));
    alert("Account created");
    showLogin();
}

function showSignup(){
    loginPage.style.display="none";
    signupPage.classList.remove("hidden");
}

function showLogin(){
    signupPage.classList.add("hidden");
    loginPage.style.display="block";
}

function showApp(){
    loginPage.style.display="none";
    signupPage.style.display="none";
    appPage.classList.remove("hidden");
}

if(localStorage.getItem("loggedIn")==="true" && currentUser) showApp();

// LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("currentUser");
    location.reload();
}

// PASSWORD
function changePassword(){
    users[currentUser].password=newPassword.value;
    localStorage.setItem("users",JSON.stringify(users));
    alert("Changed");
}

// CUSTOMER
function addCustomer(){
    let name=customerName.value;
    if(!name) return alert("Enter name");

    if(!customers[name]) customers[name]=[];
    save();
    renderCustomers();
    customerName.value="";
}

// DROPDOWN + BALANCE
function renderCustomers(){
    let dropdown=customerDropdown;
    let search=searchCustomer.value.toLowerCase();

    dropdown.innerHTML=`<option value="">Select Customer</option>`;

    for(let name in customers){
        if(!name.toLowerCase().includes(search)) continue;

        let credit=0,debit=0;

        customers[name].forEach(i=>{
            if(i.type==="credit") credit+=i.amount;
            else debit+=i.amount;
        });

        let balance=credit-debit;

        let option=document.createElement("option");
        option.value=name;
        option.text=`${name} (₹${balance})`;

        dropdown.appendChild(option);
    }
}

// SELECT CUSTOMER + INFO
function selectCustomer(){
    let name=customerDropdown.value;
    if(!name) return;

    let credit=0,debit=0;

    customers[name].forEach(i=>{
        if(i.type==="credit") credit+=i.amount;
        else debit+=i.amount;
    });

    let balance=credit-debit;
    let info=document.getElementById("selectedInfo");

    if(balance>0){
        info.innerHTML=`🔴 ${name} owes you ₹${balance}`;
        info.style.color="red";
    }
    else if(balance<0){
        info.innerHTML=`🟢 You owe ${name} ₹${Math.abs(balance)}`;
        info.style.color="green";
    }
    else{
        info.innerHTML="All clear";
        info.style.color="black";
    }

    openCustomer(name);
}

// OPEN
function openCustomer(name){
    customerTitle.innerText=name;
    transactionSection.classList.remove("hidden");
    window.currentCustomer=name;
    renderTransactions();
}

// TRANSACTION
function addTransaction(type){
    let amt=parseInt(amount.value);
    let d=date.value;
    let r=reminderDate.value;

    if(isNaN(amt)) return alert("Enter amount");

    customers[currentCustomer].push({amount:amt,type,date:d,reminder:r});
    save();
    renderTransactions();
}

function renderTransactions(){
    let list=transactions;
    list.innerHTML="";

    let credit=0,debit=0;

    customers[currentCustomer].forEach((i,index)=>{
        let li=document.createElement("li");

        if(i.type==="credit") credit+=i.amount;
        else debit+=i.amount;

        li.innerHTML=`
        <span class="${i.type}">
        ${i.type==="credit"?"➕":"➖"} ₹${i.amount}
        (${i.date||""})<br>
        🔔 ${i.reminder||"No"}
        </span>
        <button onclick="deleteTransaction(${index})">❌</button>
        `;

        list.appendChild(li);
    });

    creditTotal.innerText=credit;
    debitTotal.innerText=debit;
    balance.innerText=credit-debit;
}

function deleteTransaction(i){
    customers[currentCustomer].splice(i,1);
    save();
    renderTransactions();
}

function goBack(){
    transactionSection.classList.add("hidden");
}

// REMINDER
function checkReminders(){
    let today=new Date().toISOString().split("T")[0];

    for(let c in customers){
        customers[c].forEach(i=>{
            if(i.reminder && i.reminder<=today && i.type==="credit"){
                alert(`🔔 ${c} did not pay`);
            }
        });
    }
}
setTimeout(checkReminders,2000);

// SAVE
function save(){
    users[currentUser].customers=customers;
    localStorage.setItem("users",JSON.stringify(users));
}

renderCustomers();
</script>

</body>
</html>
